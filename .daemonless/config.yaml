icon: ':material-music:'
cit:
  mode: screenshot
  port: 8686
  wait: 600
  screenshot_wait: 10

build:
  variants:
    - tag: latest
      containerfile: Containerfile
      default: true
    - tag: develop
      containerfile: Containerfile
      args:
        LIDARR_BRANCH: develop
      tag_desc: "**Develop branch** — Servarr's recommended pre-release channel; includes plugin support (`/system/plugins`) and is more tested than nightly. One-way DB migrations; back up /config before switching back to release."
    - tag: nightly
      containerfile: Containerfile
      args:
        LIDARR_BRANCH: nightly
      tag_desc: "**Nightly branch** — bleeding-edge; also has plugin support (`/system/plugins`). One-way DB migrations; back up /config before switching back to release."
    - tag: pkg
      containerfile: Containerfile.pkg
    - tag: pkg-latest
      containerfile: Containerfile.pkg
      args:
        BASE_VERSION: "15.1-latest"
